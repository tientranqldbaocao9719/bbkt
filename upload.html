<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nộp Báo Cáo Kiểm Tra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 min-h-screen p-4 md:p-8">

    <div class="max-w-md mx-auto">
        <div class="mb-6 flex justify-center space-x-4">
            <a href="index.html" class="bg-white text-blue-600 px-6 py-2 rounded shadow font-bold hover:bg-gray-100 border border-blue-600">📊 Bảng Tổng Hợp</a>
            <a href="upload.html" class="bg-blue-600 text-white px-6 py-2 rounded shadow font-bold hover:bg-blue-700">📤 Nộp Báo Cáo Mới</a>
        </div>

        <div class="bg-white p-8 rounded-lg shadow-xl border-t-4 border-blue-600">
            <h2 class="text-2xl font-bold mb-6 text-gray-800 text-center">Nộp Báo Cáo Mới</h2>
            
            <div id="errorBox" class="hidden bg-red-100 border border-red-400 text-red-700 px-4 py-3 rounded mb-4 text-sm font-medium"></div>

            <form id="uploadForm" class="space-y-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">Chọn Đường Dây</label>
                    <select id="ma_thiet_bi" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                        <option value="">-- Đang tải danh sách... --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">Loại Biên Bản</label>
                    <select id="bbkt_id" required class="mt-1 block w-full p-2 border border-gray-300 rounded-md">
                        <option value="">-- Đang tải danh sách... --</option>
                    </select>
                </div>

                <div>
                    <label class="block text-sm font-medium text-gray-700">File Báo Cáo (Excel/PDF/Ảnh)</label>
                    <input type="file" id="fileInput" required class="mt-1 block w-full text-sm text-gray-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:bg-blue-50 file:text-blue-700 hover:file:bg-blue-100">
                </div>

                <button type="submit" id="btnSubmit" class="w-full bg-blue-600 text-white font-bold py-3 px-4 rounded hover:bg-blue-700 transition">
                    Tải lên báo cáo
                </button>
                <p id="statusMsg" class="text-center text-sm font-medium mt-2"></p>
            </form>
        </div>
    </div>

    <script>
        // 1. CẤU HÌNH API
        const supabaseUrl = 'https://exovpqkfcdoaubkmmgii.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b3ZwcWtmY2RvYXVia21tZ2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODU5MjgsImV4cCI6MjA5NDk2MTkyOH0.J6t8K8hrXuKleZ-qvL7FXJmJQydVvP45vwiykAp4NUw';
        const db = supabase.createClient(supabaseUrl, supabaseKey);
        
        const googleScriptUrl = 'https://script.google.com/macros/s/AKfycbz4IarWoVEgCHl-UD1Kobk6oGCzVx7XsPkoVHmSoCQYeHfHg-ulrHSzwIBeNkTP9NAT3A/exec';

        // 2. TẢI DANH SÁCH DROPDOWN
        async function loadDropdowns() {
            try {
                const { data: ddayData, error: err1 } = await db.from('dday').select('*').order('ten_duong_day');
                if (err1) throw err1;

                const ddaySelect = document.getElementById('ma_thiet_bi');
                ddaySelect.innerHTML = '<option value="">-- Chọn đường dây --</option>';
                ddayData.forEach(item => {
                    ddaySelect.innerHTML += `<option value="${item.ma_thiet_bi}">${item.ten_duong_day}</option>`;
                });

                const { data: dmbbData, error: err2 } = await db.from('dmbb').select('*').order('bbkt_id');
                if (err2) throw err2;

                const dmbbSelect = document.getElementById('bbkt_id');
                dmbbSelect.innerHTML = '<option value="">-- Chọn loại biên bản --</option>';
                dmbbData.forEach(item => {
                    dmbbSelect.innerHTML += `<option value="${item.bbkt_id}">${item.ten_bb}</option>`;
                });

            } catch (err) {
                const errBox = document.getElementById('errorBox');
                errBox.classList.remove('hidden');
                errBox.innerText = "Lỗi kết nối CSDL: " + err.message + "\n(Gợi ý: Hãy chắc chắn bạn đã tắt khóa RLS cho các bảng trong Supabase).";
            }
        }
        loadDropdowns();

        // 3. XỬ LÝ KHI BẤM NÚT TẢI LÊN
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const status = document.getElementById('statusMsg');
            const ma_thiet_bi = document.getElementById('ma_thiet_bi').value;
            const bbkt_id = document.getElementById('bbkt_id').value;
            const file = document.getElementById('fileInput').files[0];

            btn.disabled = true;
            btn.innerText = "⏳ Đang đẩy file lên Google Drive...";
            status.innerText = "";
            status.className = "text-center text-sm font-medium mt-2 text-blue-600";

            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    const base64Data = reader.result.split(',')[1];
                    
                    const response = await fetch(googleScriptUrl, {
                        method: 'POST',
                        body: JSON.stringify({ fileName: file.name, mimeType: file.type, base64: base64Data })
                    });
                    
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        btn.innerText = "⏳ Đang lưu dữ liệu vào hệ thống...";
                        
                        const { error } = await db.from('bbkt').insert([
                            { ma_thiet_bi: ma_thiet_bi, bbkt_id: bbkt_id, file_url: result.url }
                        ]);

                        if(error) throw error;

                        status.innerText = "✅ Tải lên thành công! Hãy qua bảng tổng hợp để kiểm tra.";
                        status.className = "text-center text-sm font-medium mt-2 text-green-600";
                        document.getElementById('uploadForm').reset();
                    } else {
                        throw new Error(result.message);
                    }
                    btn.disabled = false;
                    btn.innerText = "Tải lên báo cáo";
                };
                reader.readAsDataURL(file);
                
            } catch (err) {
                status.innerText = "❌ Lỗi: " + err.message;
                status.className = "text-center text-sm font-medium mt-2 text-red-600";
                btn.disabled = false;
                btn.innerText = "Tải lên báo cáo";
            }
        });
    </script>
</body>
</html>
