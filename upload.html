<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nộp Báo Cáo Kỹ Thuật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { background-color: #f8fafc; font-family: system-ui, -apple-system, sans-serif; }
        /* Tùy chỉnh thanh cuộn cho danh sách tìm kiếm */
        #dropdown_thiet_bi::-webkit-scrollbar { width: 6px; }
        #dropdown_thiet_bi::-webkit-scrollbar-track { background: #f1f5f9; }
        #dropdown_thiet_bi::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="text-slate-800 antialiased min-h-screen flex flex-col items-center justify-center py-6 px-4">

    <div class="w-full max-w-xl mb-4">
        <a href="index.html" class="inline-flex items-center gap-2 text-slate-600 hover:text-blue-600 font-bold text-sm transition-colors bg-white px-4 py-2 rounded shadow-sm border border-slate-200">
            <i class="fa-solid fa-arrow-left"></i> Quay lại Bảng Tổng Hợp
        </a>
    </div>

    <div class="bg-white p-6 md:p-8 rounded-xl shadow-lg border border-slate-200 w-full max-w-xl relative overflow-visible">
        <div class="absolute top-0 left-0 w-full h-2 bg-blue-600"></div>

        <div class="text-center mb-6">
            <h2 class="text-xl font-bold text-slate-800 uppercase tracking-wide">Nộp Biên Bản Kiểm Tra</h2>
            <p class="text-slate-500 text-xs mt-1">Hệ thống sẽ tự động đồng bộ và đổi tên file khoa học trên Google Drive</p>
        </div>
        
        <div id="errorBox" class="hidden bg-red-50 border-l-4 border-red-500 text-red-700 px-4 py-3 rounded mb-4 text-xs font-medium flex items-start gap-2">
            <i class="fa-solid fa-circle-exclamation mt-0.5"></i> <span id="errorText"></span>
        </div>

        <form id="uploadForm" class="space-y-5">
            
            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Ngày đi kiểm tra thực tế</label>
                <input type="date" id="ngay_kiem_tra" required class="block w-full p-2.5 border border-slate-300 rounded focus:ring-1 focus:ring-blue-400 text-sm font-medium outline-none shadow-sm">
            </div>

            <div class="relative">
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Tên Đường Dây (Gõ để tìm kiếm)</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="search_thiet_bi" placeholder="Ví dụ: Cát Lái..." autocomplete="off" required class="block w-full pl-9 pr-3 py-2.5 border border-slate-300 rounded focus:ring-1 focus:ring-blue-400 text-sm font-medium outline-none shadow-sm placeholder-slate-400">
                </div>
                <input type="hidden" id="ma_thiet_bi">
                
                <ul id="dropdown_thiet_bi" class="absolute z-50 w-full bg-white border border-slate-300 rounded-b shadow-xl max-h-52 overflow-y-auto hidden">
                    </ul>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Loại Biên Bản</label>
                <select id="bbkt_id" required class="block w-full p-2.5 border border-slate-300 rounded bg-slate-50 focus:bg-white text-sm outline-none shadow-sm">
                    <option value="">-- Chọn loại biên bản --</option>
                </select>
            </div>

            <div>
                <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Chọn File báo cáo</label>
                <div class="border border-dashed border-slate-300 rounded p-3 bg-slate-50 hover:bg-slate-100 transition-colors">
                    <input type="file" id="fileInput" required class="block w-full text-xs text-slate-500 file:mr-4 file:py-2 file:px-4 file:rounded file:border-0 file:text-xs file:font-bold file:bg-blue-600 file:text-white hover:file:bg-blue-700 cursor-pointer transition-colors">
                </div>
            </div>

            <button type="submit" id="btnSubmit" class="w-full bg-slate-900 text-white font-bold text-sm py-3 px-4 rounded hover:bg-blue-600 transition-all flex justify-center items-center gap-2 mt-2">
                <i class="fa-solid fa-paper-plane"></i> XÁC NHẬN TẢI LÊN
            </button>

            <div id="statusContainer" class="hidden text-center p-3 rounded font-bold text-sm border"></div>
        </form>
    </div>

    <script>
        document.getElementById('ngay_kiem_tra').value = new Date().toISOString().split('T')[0];

        // --- CẤU HÌNH API ---
        const supabaseUrl = 'https://exovpqkfcdoaubkmmgii.supabase.co'; 
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b3ZwcWtmY2RvYXVia21tZ2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODU5MjgsImV4cCI6MjA5NDk2MTkyOH0.J6t8K8hrXuKleZ-qvL7FXJmJQydVvP45vwiykAp4NUw';
        const db = supabase.createClient(supabaseUrl, supabaseKey);
        
        const googleScriptUrl = 'https://script.google.com/macros/s/AKfycbwOo1wv-sAjt7PrNSZuZHs3LyNALsHlNGzSmFnjyPz0bHwaYrZ_xal84exutrQLn8v5Uw/exec';

        let globalDdayData = []; // Lưu trữ danh sách đường dây để tìm kiếm
        const searchInput = document.getElementById('search_thiet_bi');
        const hiddenInput = document.getElementById('ma_thiet_bi');
        const dropdownList = document.getElementById('dropdown_thiet_bi');

        async function loadDropdowns() {
            try {
                // Tải danh sách đường dây
                const { data: ddayData, error: err1 } = await db.from('dday').select('*').order('ten_duong_day');
                if (err1) throw err1;
                globalDdayData = ddayData;

                // Tải danh sách loại biên bản
                const { data: dmbbData, error: err2 } = await db.from('dmbb').select('*').order('bbkt_id');
                if (err2) throw err2;
                const dmbbSelect = document.getElementById('bbkt_id');
                dmbbSelect.innerHTML = '<option value="">-- Chọn loại biên bản --</option>';
                dmbbData.forEach(item => dmbbSelect.innerHTML += `<option value="${item.bbkt_id}">${item.ten_bb}</option>`);
            } catch (err) {
                showError("Không thể kết nối máy chủ dữ liệu: " + err.message);
            }
        }

        // --- XỬ LÝ TÌM KIẾM ĐƯỜNG DÂY NHƯ GOOGLE ---
        function renderDropdown(data) {
            dropdownList.innerHTML = '';
            if (data.length === 0) {
                dropdownList.innerHTML = '<li class="p-3 text-sm text-slate-500 italic text-center">Không tìm thấy đường dây nào</li>';
                dropdownList.classList.remove('hidden');
                return;
            }
            data.forEach(item => {
                const li = document.createElement('li');
                li.className = 'p-2.5 text-sm hover:bg-blue-50 hover:text-blue-700 cursor-pointer border-b border-slate-100 last:border-b-0 text-slate-700 transition-colors';
                li.textContent = item.ten_duong_day;
                
                // Khi người dùng bấm chọn một dòng
                li.onclick = () => {
                    searchInput.value = item.ten_duong_day; // Hiển thị tên ra ngoài
                    hiddenInput.value = item.ma_thiet_bi;   // Giấu mã thiết bị vào trong
                    dropdownList.classList.add('hidden');   // Ẩn danh sách
                    
                    // Đổi màu viền xanh báo hiệu đã chọn chuẩn
                    searchInput.classList.remove('border-red-400');
                    searchInput.classList.add('border-green-400', 'bg-green-50');
                };
                dropdownList.appendChild(li);
            });
            dropdownList.classList.remove('hidden');
        }

        // Khi người dùng đang gõ phím
        searchInput.addEventListener('input', (e) => {
            const val = e.target.value.toLowerCase();
            // Lọc dữ liệu theo Tên hoặc Mã
            const filtered = globalDdayData.filter(item => 
                item.ten_duong_day.toLowerCase().includes(val) || 
                item.ma_thiet_bi.toLowerCase().includes(val)
            );
            renderDropdown(filtered);
            
            // Xóa giá trị mã thiết bị ẩn nếu người dùng tự sửa text
            hiddenInput.value = '';
            searchInput.classList.remove('border-green-400', 'bg-green-50');
        });

        // Khi người dùng bấm chuột vào ô nhập (hiện toàn bộ danh sách)
        searchInput.addEventListener('focus', () => {
            const val = searchInput.value.toLowerCase();
            if(!val) {
                renderDropdown(globalDdayData);
            } else {
                renderDropdown(globalDdayData.filter(item => item.ten_duong_day.toLowerCase().includes(val)));
            }
        });

        // Tự động ẩn danh sách khi bấm ra ngoài
        document.addEventListener('click', (e) => {
            if (!searchInput.contains(e.target) && !dropdownList.contains(e.target)) {
                dropdownList.classList.add('hidden');
            }
        });

        // --- XỬ LÝ NỘP FORM ---
        document.getElementById('uploadForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('btnSubmit');
            const statusContainer = document.getElementById('statusContainer');
            
            const ngay_kiem_tra = document.getElementById('ngay_kiem_tra').value;
            const ma_thiet_bi = document.getElementById('ma_thiet_bi').value;
            const bbkt_id = document.getElementById('bbkt_id').value;
            const file = document.getElementById('fileInput').files[0];

            // Bắt lỗi nếu gõ text linh tinh mà không chọn đúng đường dây từ danh sách
            if (!ma_thiet_bi) {
                searchInput.classList.add('border-red-400');
                showError("Vui lòng BẤM CHỌN một Đường Dây từ danh sách gợi ý!");
                searchInput.focus();
                return;
            }

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ĐANG TẢI FILE LÊN DRIVE...';
            statusContainer.classList.add('hidden');
            hideError();

            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    const base64Data = reader.result.split(',')[1];
                    
                    const response = await fetch(googleScriptUrl, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            fileName: file.name, 
                            mimeType: file.type, 
                            base64: base64Data,
                            ma_thiet_bi: ma_thiet_bi,
                            bbkt_id: bbkt_id,
                            ngay_kiem_tra: ngay_kiem_tra
                        })
                    });
                    
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> ĐANG GHI NHẬN HỆ THỐNG...';
                        
                        const { error } = await db.from('bbkt').insert([
                            { ma_thiet_bi: ma_thiet_bi, bbkt_id: bbkt_id, file_url: result.url, thoi_gian: ngay_kiem_tra }
                        ]);

                        if(error) throw error;

                        statusContainer.classList.remove('hidden');
                        statusContainer.className = "text-center p-3 rounded font-bold text-sm bg-green-50 border border-green-200 text-green-700";
                        statusContainer.innerHTML = '✅ Tải lên thành công và đã tự đổi tên file!';
                        
                        // Reset form
                        hiddenInput.value = "";
                        searchInput.value = "";
                        searchInput.classList.remove('border-green-400', 'bg-green-50');
                        document.getElementById('bbkt_id').value = "";
                        document.getElementById('fileInput').value = "";
                    } else {
                        throw new Error(result.message);
                    }
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> XÁC NHẬN TẢI LÊN';
                };
                reader.readAsDataURL(file);
                
            } catch (err) {
                statusContainer.classList.remove('hidden');
                statusContainer.className = "text-center p-3 rounded font-bold text-sm bg-red-50 border border-red-200 text-red-700";
                statusContainer.innerHTML = '❌ Lỗi: ' + err.message;
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane"></i> XÁC NHẬN TẢI LÊN';
            }
        });

        function showError(msg) {
            const errBox = document.getElementById('errorBox');
            errBox.classList.remove('hidden');
            document.getElementById('errorText').innerText = msg;
        }

        function hideError() {
            document.getElementById('errorBox').classList.add('hidden');
        }

        // Bắt đầu tải dữ liệu khi mở web
        loadDropdowns();
    </script>
</body>
</html>
