<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Báo Cáo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* Tối ưu hóa cho màn hình cảm ứng và vuốt ngang */
        .sticky-col { position: sticky; left: 0; background-color: #ffffff; z-index: 20; border-right: 1px solid #e2e8f0; }
        .sticky-header { position: sticky; top: 0; z-index: 30; }
        .cell-yellow { background-color: #fef9c3; } 
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow: hidden; }
        /* Tự động tính toán chiều cao để không bị cuộn cả trang web, chỉ cuộn cái bảng */
        .table-container { height: calc(100vh - 190px); overflow: auto; -webkit-overflow-scrolling: touch; }
        td, th { padding: 8px; font-size: 13px; text-align: center; white-space: nowrap; } /* white-space: nowrap giúp bảng không bị vỡ trên mobile */
        
        /* Ẩn thanh cuộn bớt cho đẹp trên mobile */
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50 font-sans leading-tight text-slate-800 antialiased h-screen overflow-hidden">

    <nav class="bg-slate-900 p-3 shadow z-50 relative">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center gap-3">
            <div class="text-white font-bold text-lg flex items-center">
                <i class="fa-solid fa-tower-transmission mr-2 text-blue-400"></i> Quản Lý Báo Cáo
            </div>
            
            <div class="flex flex-wrap justify-center gap-2">
                <a href="index.html" class="bg-white text-blue-600 px-4 py-1.5 rounded shadow text-sm font-bold border border-blue-600 active:scale-95 transition-transform">Tháng</a>
                <a href="nam.html" class="bg-blue-600 text-white px-4 py-1.5 rounded shadow text-sm font-bold border border-transparent active:scale-95 transition-transform">Năm</a>
                <a href="upload.html" class="bg-white text-blue-600 px-4 py-1.5 rounded shadow text-sm font-bold border border-blue-600 active:scale-95 transition-transform">Nộp Mới</a>
            </div>
        </div>
    </nav>

    <div class="p-2 md:p-4 w-full h-full flex flex-col">
        <div class="bg-white rounded-lg shadow-lg flex flex-col flex-1 overflow-hidden border border-slate-200">
            
            <div class="p-3 border-b bg-slate-50 flex flex-col md:flex-row items-center gap-3 justify-between shrink-0">
                <div class="relative w-full md:w-80">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="nameFilter" onkeyup="filterTable()" placeholder="Lọc theo tên..." class="pl-9 pr-4 py-2 w-full border rounded-md focus:ring-1 focus:ring-blue-400 outline-none text-sm shadow-sm">
                </div>
                <div class="text-[11px] md:text-xs text-slate-500 font-medium text-center md:text-right w-full md:w-auto bg-white p-1.5 rounded border border-slate-100 shadow-sm">
                    <i class="fa-solid fa-circle-info mr-1 text-yellow-500"></i> Ô <span class="bg-yellow-100 px-1.5 py-0.5 rounded border border-yellow-300 text-yellow-800">vàng</span> là thiếu. Chạm để xem file.
                </div>
            </div>

            <div class="table-container w-full bg-white relative">
                <table class="w-full text-left border-collapse" id="reportTable">
                    <thead class="sticky-header shadow-sm bg-slate-100" id="thead">
                        </thead>
                    <tbody id="tbody" class="divide-y divide-slate-200 bg-white">
                        <tr><td colspan="10" class="p-10 text-center font-bold text-blue-500 animate-pulse text-sm">Đang đồng bộ dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-[100] px-2">
        <div class="modal-overlay absolute w-full h-full bg-slate-900 opacity-60" onclick="toggleModal()"></div>
        <div class="modal-container bg-white w-full md:max-w-md mx-auto rounded-xl shadow-2xl z-50 overflow-hidden transform scale-95 transition-transform duration-300 flex flex-col max-h-[85vh]">
            <div class="py-3 px-4 bg-slate-50 border-b flex justify-between items-center shrink-0">
                <p class="text-base md:text-lg font-bold text-slate-800 truncate pr-4" id="modalTitle">Chi tiết báo cáo</p>
                <div class="cursor-pointer bg-slate-200 hover:bg-slate-300 w-8 h-8 rounded-full flex items-center justify-center transition-colors" onclick="toggleModal()">
                    <i class="fa-solid fa-xmark text-slate-600"></i>
                </div>
            </div>
            <div id="modalBody" class="p-4 space-y-2 overflow-y-auto bg-white flex-1">
                </div>
        </div>
    </div>

    <script>
        // --- 1. CẤU HÌNH API ---
        const supabaseUrl = 'https://exovpqkfcdoaubkmmgii.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b3ZwcWtmY2RvYXVia21tZ2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODU5MjgsImV4cCI6MjA5NDk2MTkyOH0.J6t8K8hrXuKleZ-qvL7FXJmJQydVvP45vwiykAp4NUw';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        async function init() {
            const year = new Date().getFullYear();
            const { data, error } = await db.rpc('get_yearly_report_summary', { target_year: parseInt(year) });
            
            if (error) {
                console.error(error);
                alert("Lỗi tải dữ liệu!");
                return;
            }

            renderHeader(data.config);
            renderBody(data.data, data.config);
        }

        function renderHeader(config) {
            // Tối ưu độ rộng cột cho phù hợp màn hình nhỏ
            let html = `<tr class="bg-slate-100 text-slate-700 uppercase text-[11px] md:text-xs">
                <th class="p-2 md:p-3 sticky-col top-0 font-bold border-b border-slate-300 shadow-sm w-48 md:w-72 text-left z-[35]">Tên Đường Dây</th>`;
            config.forEach(c => {
                html += `<th class="p-2 md:p-3 text-center border-b border-slate-300 shadow-sm min-w-[90px] md:min-w-[120px]">
                    <span class="block truncate w-24 md:w-auto mx-auto" title="${c.ten_bb}">${c.ten_bb}</span>
                    <span class="text-[9px] md:text-[10px] text-gray-500 font-normal mt-0.5 block normal-case">Cần: ${c.required_count}</span>
                </th>`;
            });
            html += `</tr>`;
            document.getElementById('thead').innerHTML = html;
        }

        function renderBody(data, config) {
            let html = '';
            data.forEach(row => {
                html += `<tr class="hover:bg-slate-50 transition-colors group">
                    <td class="p-2 md:p-3 font-bold text-slate-700 text-[12px] md:text-sm sticky-col bg-white text-left group-hover:bg-slate-50 border-r border-slate-200 truncate max-w-[12rem] md:max-w-xs" title="${row.ten_duong_day}">${row.ten_duong_day}</td>`;
                
                config.forEach(c => {
                    const r = row.reports[c.bbkt_id];
                    const isMissing = r.actual < r.required;
                    const cellClass = isMissing ? 'cell-yellow' : 'text-slate-600';
                    
                    html += `<td class="p-1 md:p-2 text-center font-bold ${cellClass} border-r border-slate-100 last:border-r-0">
                        <button onclick='showDetails("${row.ten_duong_day}", "${c.ten_bb}", ${JSON.stringify(r.details)})' 
                                class="w-full h-full py-1.5 px-1 md:px-2 rounded hover:bg-black/5 active:bg-black/10 transition-all text-sm md:text-base flex items-center justify-center cursor-pointer">
                            ${r.actual} <span class="text-[10px] md:text-xs font-medium opacity-50 mx-0.5 md:mx-1">/</span> ${r.required}
                        </button>
                    </td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('tbody').innerHTML = html;
        }

        function showDetails(lineName, reportName, details) {
            document.getElementById('modalTitle').innerText = reportName;
            
            let html = `<div class="mb-3 text-[13px] md:text-sm text-slate-600 font-bold bg-slate-100 p-2 rounded border border-slate-200 truncate" title="${lineName}"><i class="fa-solid fa-location-dot mr-1 text-blue-500"></i> ${lineName}</div>`;
            
            if (details.length === 0) {
                html += '<p class="text-center text-slate-400 italic py-4 text-sm">Chưa có dữ liệu nộp.</p>';
            } else {
                details.forEach((d, i) => {
                    html += `<div class="flex justify-between items-center bg-slate-50 p-2.5 md:p-3 rounded-lg border border-slate-200 mb-2 active:border-blue-300 transition-colors">
                        <div>
                            <p class="text-[10px] md:text-xs text-slate-500 uppercase font-bold">Lần ${details.length - i}</p>
                            <p class="font-bold text-slate-800 text-[13px] md:text-sm mt-0.5">${d.ngay}</p>
                        </div>
                        <a href="${d.url}" target="_blank" class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded-md text-[11px] md:text-xs font-bold active:bg-blue-200 transition-colors flex items-center gap-1 shadow-sm">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i> Xem
                        </a>
                    </div>`;
                });
            }
            document.getElementById('modalBody').innerHTML = html;
            toggleModal();
        }

        function filterTable() {
            const input = document.getElementById("nameFilter").value.toUpperCase();
            const tr = document.getElementById("tbody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    let textValue = td.textContent || td.innerText;
                    tr[i].style.display = textValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }

        function toggleModal() {
            const body = document.querySelector('body');
            const modal = document.getElementById('modal');
            const modalContainer = modal.querySelector('.modal-container');
            
            if(modal.classList.contains('opacity-0')) {
                modal.classList.remove('opacity-0', 'pointer-events-none');
                setTimeout(() => modalContainer.classList.remove('scale-95'), 10);
            } else {
                modalContainer.classList.add('scale-95');
                setTimeout(() => modal.classList.add('opacity-0', 'pointer-events-none'), 200);
            }
            body.classList.toggle('modal-active');
        }

        init();
    </script>
</body>
</html>
