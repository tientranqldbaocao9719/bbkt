<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Bảng Theo Dõi Biên Bản Kiểm Tra</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        /* CSS Xử lý ghim tiêu đề và đường viền bảng giống hệt Excel */
        .table-container { max-height: 80vh; overflow-y: auto; overflow-x: auto; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; min-width: max-content; }
        th { 
            position: sticky; top: 0; background-color: #e5e7eb; z-index: 10; 
            padding: 12px; border-bottom: 2px solid #9ca3af; border-right: 1px solid #d1d5db; font-weight: bold;
        }
        /* Ghim cột đầu tiên (Tên đường dây) khi cuộn ngang */
        th:first-child, td:first-child {
            position: sticky; left: 0; background-color: #f9fafb; z-index: 20;
            border-right: 2px solid #9ca3af; box-shadow: 2px 0 5px rgba(0,0,0,0.05);
        }
        th:first-child { z-index: 30; background-color: #e5e7eb; }
        td { padding: 10px; border-bottom: 1px solid #e5e7eb; border-right: 1px solid #e5e7eb; text-align: center; }
        tr:hover td { background-color: #f3f4f6; }
    </style>
</head>
<body class="bg-gray-100 p-4 md:p-8">

    <div class="max-w-screen-2xl mx-auto">
        <div class="mb-6 flex justify-center space-x-4">
            <a href="index.html" class="bg-blue-600 text-white px-6 py-2 rounded shadow font-bold hover:bg-blue-700">📊 Bảng Tổng Hợp</a>
            <a href="upload.html" class="bg-white text-blue-600 px-6 py-2 rounded shadow font-bold hover:bg-gray-100 border border-blue-600">📤 Nộp Báo Cáo Mới</a>
        </div>

        <div class="bg-white rounded-lg shadow-xl p-6 border-t-4 border-blue-600">
            <h1 class="text-2xl font-bold text-gray-800 mb-6 uppercase text-center">Tổng hợp tiến độ nộp biên bản kiểm tra</h1>
            
            <div class="table-container border border-gray-300 rounded">
                <table id="mainTable">
                    <thead id="tableHead">
                        <tr><th>Đang tải cấu trúc bảng...</th></tr>
                    </thead>
                    <tbody id="tableBody">
                        <tr><td class="text-center py-8 text-blue-600 font-bold">Đang tính toán dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <script>
        // 1. KẾT NỐI API (Nhớ thay Key và URL của bạn)
        const supabaseUrl = 'https://exovpqkfcdoaubkmmgii.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b3ZwcWtmY2RvYXVia21tZ2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODU5MjgsImV4cCI6MjA5NDk2MTkyOH0.J6t8K8hrXuKleZ-qvL7FXJmJQydVvP45vwiykAp4NUw';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        async function loadData() {
            try {
                // Tải dữ liệu 3 bảng cùng lúc (Lấy bbkt mới nhất đưa lên đầu)
                const [resDday, resDmbb, resBbkt] = await Promise.all([
                    db.from('dday').select('*').order('ten_duong_day'),
                    db.from('dmbb').select('*').order('bbkt_id'),
                    db.from('bbkt').select('*').order('thoi_gian', { ascending: false })
                ]);

                if (resDday.error || resDmbb.error || resBbkt.error) throw new Error("Lỗi đọc dữ liệu từ Supabase");

                // --- TẠO TIÊU ĐỀ BẢNG (Gắn luôn tần suất vào tiêu đề) ---
                let thHtml = `<tr><th class="text-left w-72 uppercase">Tên Đường Dây</th>`;
                resDmbb.data.forEach(bb => {
                    thHtml += `<th>${bb.ten_bb}<br><span class="text-xs text-gray-500 font-normal">(${bb.tan_suat} tháng/lần)</span></th>`;
                });
                thHtml += `</tr>`;
                document.getElementById('tableHead').innerHTML = thHtml;

                // --- TẠO THÂN BẢNG & TÍNH TOÁN HẠN NỘP ---
                let tbHtml = '';
                const now = new Date();

                resDday.data.forEach(dd => {
                    tbHtml += `<tr><td class="text-left font-medium text-gray-800 text-sm">${dd.ten_duong_day}</td>`;
                    
                    resDmbb.data.forEach(bb => {
                        // Tìm biên bản nộp GẦN NHẤT của đường dây này
                        const report = resBbkt.data.find(r => r.ma_thiet_bi === dd.ma_thiet_bi && r.bbkt_id === bb.bbkt_id);
                        
                        if (!report) {
                            tbHtml += `<td></td>`; // Để trống tinh tươm
                        } else {
                            const reportDate = new Date(report.thoi_gian);
                            const diffMonths = (now.getFullYear() - reportDate.getFullYear()) * 12 + (now.getMonth() - reportDate.getMonth());
                            const dateStr = `${reportDate.getDate()}/${reportDate.getMonth()+1}/${reportDate.getFullYear()}`;

                            // So sánh số tháng chênh lệch với quy định
                            if (diffMonths > bb.tan_suat) {
                                // QUÁ HẠN (Màu đỏ)
                                tbHtml += `<td class="bg-red-50 text-red-600 text-xs">
                                    <span class="font-bold">⚠️ Quá hạn</span><br>
                                    <a href="${report.file_url}" target="_blank" class="underline hover:text-red-800">File cũ (${dateStr})</a>
                                </td>`;
                            } else {
                                // ĐÚNG HẠN (Màu xanh)
                                tbHtml += `<td class="text-green-600 text-xs">
                                    <a href="${report.file_url}" target="_blank" class="underline font-bold hover:text-green-800">✅ Xem (${dateStr})</a>
                                </td>`;
                            }
                        }
                    });
                    tbHtml += `</tr>`;
                });
                document.getElementById('tableBody').innerHTML = tbHtml;

            } catch (err) {
                document.getElementById('tableBody').innerHTML = `<tr><td class="text-red-500 font-bold p-4">❌ Lỗi: ${err.message}. Hãy kiểm tra kết nối mạng hoặc API Key.</td></tr>`;
            }
        }
        loadData();
    </script>
</body>
</html>
