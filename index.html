<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Báo Cáo Kỹ Thuật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sticky-col { position: sticky; left: 0; background-color: white; z-index: 20; border-right: 2px solid #cbd5e1; }
        .sticky-header { position: sticky; top: 0; z-index: 30; }
        .cell-yellow { background-color: #fef9c3; } /* Màu vàng cảnh báo thiếu */
        .modal { transition: opacity 0.25s ease; }
        body.modal-active { overflow-x: hidden; overflow-y: visible !important; }
        .table-container { height: calc(100vh - 250px); overflow: auto; }
    </style>
</head>
<body class="bg-slate-100 font-sans leading-normal tracking-normal text-slate-900">

    <nav class="bg-slate-800 p-4 shadow-lg sticky top-0 z-50">
        <div class="container mx-auto flex flex-col md:flex-row justify-between items-center">
            <div class="text-white font-bold text-xl mb-4 md:mb-0">
                <i class="fa-solid fa-tower-transmission mr-2 text-blue-400"></i> TRẠM QUẢN LÝ BÁO CÁO
            </div>
            
            <div id="summaryStats" class="flex space-x-6 text-white text-xs md:text-sm">
                </div>

            <div class="flex space-x-2 mt-4 md:mt-0">
                <input type="number" id="yearPicker" value="2026" class="p-2 rounded bg-slate-700 text-white border-none w-20 font-bold" onchange="init()">
                <a href="upload.html" class="bg-blue-500 hover:bg-blue-600 text-white px-4 py-2 rounded font-bold shadow transition"><i class="fa-solid fa-plus mr-1"></i> Nộp Mới</a>
            </div>
        </div>
    </nav>

    <div class="p-4 md:p-8">
        <div class="bg-white rounded-xl shadow-2xl overflow-hidden">
            <div class="p-4 border-b bg-slate-50 flex flex-col md:flex-row items-center gap-4">
                <div class="relative w-full md:w-96">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
                        <i class="fa-solid fa-magnifying-glass"></i>
                    </span>
                    <input type="text" id="nameFilter" onkeyup="filterTable()" placeholder="Lọc theo tên đường dây..." class="pl-10 pr-4 py-2 w-full border rounded-lg focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
                <div class="text-sm text-slate-500 font-medium">
                    <i class="fa-solid fa-circle-info mr-1"></i> Ô <span class="bg-yellow-100 px-2 py-0.5 rounded border border-yellow-300">màu vàng</span> là chưa đủ chỉ tiêu năm. Click vào số để xem chi tiết.
                </div>
            </div>

            <div class="table-container border-t">
                <table class="w-full text-left border-collapse" id="reportTable">
                    <thead class="sticky-header shadow-md" id="thead">
                        </thead>
                    <tbody id="tbody" class="divide-y divide-slate-200">
                        <tr><td colspan="10" class="p-20 text-center font-bold text-blue-500 text-xl animate-pulse">Đang Supabase xử lý dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed w-full h-full top-0 left-0 flex items-center justify-center z-[100]">
        <div class="modal-overlay absolute w-full h-full bg-black opacity-50"></div>
        <div class="modal-container bg-white w-11/12 md:max-w-md mx-auto rounded shadow-lg z-50 overflow-y-auto">
            <div class="modal-content py-4 text-left px-6">
                <div class="flex justify-between items-center pb-3 border-b">
                    <p class="text-xl font-bold text-slate-800" id="modalTitle">Chi tiết nộp báo cáo</p>
                    <div class="cursor-pointer z-50" onclick="toggleModal()"><i class="fa-solid fa-xmark text-2xl"></i></div>
                </div>
                <div id="modalBody" class="py-4 space-y-3 max-h-96 overflow-auto">
                    </div>
            </div>
        </div>
    </div>

    <script>
        // CẤU HÌNH API
        const supabaseUrl = 'https://exovpqkfcdoaubkmmgii.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b3ZwcWtmY2RvYXVia21tZ2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODU5MjgsImV4cCI6MjA5NDk2MTkyOH0.J6t8K8hrXuKleZ-qvL7FXJmJQydVvP45vwiykAp4NUw';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let reportData = [];

        async function init() {
            const year = document.getElementById('yearPicker').value;
            // Gọi hàm xử lý Server-side RPC từ Supabase
            const { data, error } = await db.rpc('get_yearly_report_summary', { target_year: parseInt(year) });
            
            if (error) {
                console.error(error);
                alert("Lỗi tải dữ liệu. Hãy chắc chắn bạn đã tạo Hàm Function trên Supabase.");
                return;
            }

            reportData = data.data;
            renderHeader(data.config);
            renderBody(data.data, data.config);
            calculateSummary(data.data, data.config);
        }

        function renderHeader(config) {
            let html = `<tr class="bg-slate-200 text-slate-700 uppercase text-xs">
                <th class="p-4 sticky-col top-0">Tên Đường Dây</th>`;
            config.forEach(c => {
                html += `<th class="p-4 text-center">${c.ten_bb}<br><span class="text-[10px] lowercase font-normal opacity-70">Cần ${c.required_count} bản/năm</span></th>`;
            });
            html += `</tr>`;
            document.getElementById('thead').innerHTML = html;
        }

        function renderBody(data, config) {
            let html = '';
            data.forEach(row => {
                html += `<tr class="hover:bg-slate-50 transition">
                    <td class="p-4 font-bold text-sm sticky-col">${row.ten_duong_day}</td>`;
                
                config.forEach(c => {
                    const r = row.reports[c.bbkt_id];
                    const isMissing = r.actual < r.required;
                    const cellClass = isMissing ? 'cell-yellow' : '';
                    
                    html += `<td class="p-4 text-center font-bold text-sm ${cellClass}">
                        <button onclick='showDetails("${row.ten_duong_day}", "${c.ten_bb}", ${JSON.stringify(r.details)})' class="hover:scale-110 transition cursor-pointer">
                            ${r.actual}/${r.required}
                        </button>
                    </td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('tbody').innerHTML = html;
        }

        function calculateSummary(data, config) {
            let statsHtml = '';
            config.forEach(c => {
                let totalActual = 0;
                let totalRequired = data.length * c.required_count;
                data.forEach(row => totalActual += row.reports[c.bbkt_id].actual);
                
                statsHtml += `<div class="border-l border-slate-600 pl-4">
                    <p class="opacity-70 text-[10px] uppercase">${c.ten_bb}</p>
                    <p class="font-bold text-blue-400">${totalActual}/${totalRequired}</p>
                </div>`;
            });
            document.getElementById('summaryStats').innerHTML = statsHtml;
        }

        function showDetails(lineName, reportName, details) {
            document.getElementById('modalTitle').innerText = `${lineName} - ${reportName}`;
            let html = '';
            if (details.length === 0) {
                html = '<p class="text-center text-slate-400 italic">Chưa có biên bản nào được nộp trong năm này.</p>';
            } else {
                details.forEach((d, i) => {
                    html += `<div class="flex justify-between items-center bg-slate-50 p-3 rounded border border-slate-200">
                        <div>
                            <p class="text-xs text-slate-500">Lần ${details.length - i}</p>
                            <p class="font-bold">Ngày kiểm tra: ${d.ngay}</p>
                        </div>
                        <a href="${d.url}" target="_blank" class="bg-blue-100 text-blue-700 px-3 py-1 rounded-full text-xs font-bold hover:bg-blue-200"><i class="fa-solid fa-file-pdf mr-1"></i> Xem file</a>
                    </div>`;
                });
            }
            document.getElementById('modalBody').innerHTML = html;
            toggleModal();
        }

        function filterTable() {
            const input = document.getElementById("nameFilter").value.toUpperCase();
            const tr = document.getElementById("tbody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    let textValue = td.textContent || td.innerText;
                    tr[i].style.display = textValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }

        function toggleModal() {
            const body = document.querySelector('body');
            const modal = document.getElementById('modal');
            modal.classList.toggle('opacity-0');
            modal.classList.toggle('pointer-events-none');
            body.classList.toggle('modal-active');
        }

        init();
    </script>
</body>
</html>
