<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Quản Lý Báo Cáo Kỹ Thuật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sticky-col { position: sticky; left: 0; background-color: #ffffff; z-index: 20; border-right: 1px solid #e2e8f0; }
        .sticky-header { position: sticky; top: 0; z-index: 30; }
        .cell-yellow { background-color: #fef9c3; } 
        .modal { transition: opacity 0.2s ease; }
        body.modal-active { overflow: hidden; }
        
        .table-container { height: calc(100vh - 170px); overflow: auto; -webkit-overflow-scrolling: touch; }
        td { padding: 8px 12px; font-size: 13px; text-align: center; white-space: nowrap; }
        th { padding: 8px 12px; font-size: 13px; text-align: center; white-space: normal; line-height: 1.2; }
        
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
        
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-slate-50 font-sans leading-tight text-slate-800 antialiased h-screen overflow-hidden flex flex-col">

    <nav class="bg-slate-900 p-2 md:px-4 shadow z-50 shrink-0">
        <div class="mx-auto flex flex-wrap justify-between items-center gap-2">
            <div class="text-white font-bold text-base md:text-lg flex items-center">
                <i class="fa-solid fa-bolt mr-2 text-blue-400"></i> APP QUẢN LÝ BÁO CÁO
            </div>
            
            <div class="flex items-center gap-2">
                <div class="bg-slate-800 flex items-center rounded border border-slate-700 overflow-hidden">
                    <span class="px-2 text-slate-400 text-xs font-medium hidden md:inline">Năm</span>
                    <select id="yearPicker" class="p-1 md:p-1.5 bg-slate-700 text-white font-bold text-sm outline-none cursor-pointer" onchange="init()"></select>
                </div>
                <a href="admin.html" class="bg-red-600 text-white px-3 py-1 md:py-1.5 rounded shadow text-xs md:text-sm font-bold border border-transparent hover:bg-red-500 transition-colors">Admin</a>
            </div>
        </div>
    </nav>

    <div class="bg-slate-800 border-b border-slate-700 py-1.5 px-2 overflow-x-auto hide-scrollbar shrink-0 shadow-inner">
        <div id="summaryStats" class="flex gap-2 min-w-max md:justify-center">
            <span class="text-slate-400 text-xs italic px-2">Đang tải thống kê...</span>
        </div>
    </div>

    <div class="p-2 md:p-4 w-full flex-1 flex flex-col min-h-0">
        <div class="bg-white rounded shadow-md flex flex-col h-full border border-slate-200 overflow-hidden">
            <div class="p-2 border-b bg-slate-50 flex justify-between items-center gap-3 shrink-0">
                <div class="relative w-full md:w-80">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" id="nameFilter" onkeyup="filterTable()" placeholder="Lọc theo tên đường dây..." class="pl-9 pr-3 py-1.5 w-full border border-slate-300 rounded focus:ring-1 focus:ring-blue-400 outline-none text-sm">
                </div>
                <div class="text-[10px] md:text-xs text-slate-500 font-medium whitespace-nowrap hidden sm:block">
                    Ô <span class="bg-yellow-100 px-1.5 py-0.5 rounded border border-yellow-300 text-yellow-800">vàng</span> là thiếu
                </div>
            </div>

            <div class="table-container w-full bg-white relative flex-1">
                <table class="w-full text-left border-collapse" id="reportTable">
                    <thead class="sticky-header shadow-sm bg-slate-100" id="thead"></thead>
                    <tbody id="tbody" class="divide-y divide-slate-200 bg-white">
                        <tr><td colspan="10" class="p-10 text-center font-bold text-blue-500 animate-pulse text-sm">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-[100] px-2">
        <div class="modal-overlay absolute inset-0 bg-slate-900 bg-opacity-50" onclick="toggleModal()"></div>
        <div class="modal-container bg-white w-full max-w-sm md:max-w-md mx-auto rounded shadow-xl z-50 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="py-2.5 px-4 bg-slate-50 border-b flex justify-between items-center shrink-0">
                <p class="text-sm md:text-base font-bold text-slate-800 truncate pr-4" id="modalTitle">Chi tiết</p>
                <div class="cursor-pointer text-slate-500 hover:text-slate-800" onclick="toggleModal()">
                    <i class="fa-solid fa-xmark text-lg"></i>
                </div>
            </div>
            <div id="modalBody" class="p-3 space-y-2 overflow-y-auto bg-white flex-1">
                </div>
        </div>
    </div>

    <script>
        // --- 1. CẤU HÌNH API ---
        const supabaseUrl = 'https://exovpqkfcdoaubkmmgii.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b3ZwcWtmY2RvYXVia21tZ2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODU5MjgsImV4cCI6MjA5NDk2MTkyOH0.J6t8K8hrXuKleZ-qvL7FXJmJQydVvP45vwiykAp4NUw';
        const db = supabase.createClient(supabaseUrl, supabaseKey);
        
        // Cấu hình Link Google Apps Script cho tính năng Upload Inline
        const googleScriptUrl = 'https://script.google.com/macros/s/AKfycbwOo1wv-sAjt7PrNSZuZHs3LyNALsHlNGzSmFnjyPz0bHwaYrZ_xal84exutrQLn8v5Uw/exec';

        const currentYear = new Date().getFullYear();
        const yearPicker = document.getElementById('yearPicker');
        for (let y = currentYear - 2; y <= currentYear + 4; y++) {
            yearPicker.innerHTML += `<option value="${y}" ${y === currentYear ? 'selected' : ''}>${y}</option>`;
        }

        async function init() {
            const year = document.getElementById('yearPicker').value;
            const { data, error } = await db.rpc('get_yearly_report_summary', { target_year: parseInt(year) });
            
            if (error) { console.error(error); alert("Lỗi tải dữ liệu!"); return; }

            renderHeader(data.config);
            renderBody(data.data, data.config);
            calculateSummary(data.data, data.config);
        }

        function renderHeader(config) {
            let html = `<tr class="bg-slate-100 text-slate-700 uppercase text-[10px] md:text-[11px] tracking-wide">
                <th class="p-2 sticky-col top-0 font-bold border-b border-slate-300 shadow-sm w-48 md:w-64 text-left z-[35]">Tên Đường Dây</th>`;
            config.forEach(c => {
                html += `<th class="p-2 text-center border-b border-slate-300 shadow-sm w-24 md:w-32">
                    <span class="block mx-auto whitespace-normal leading-tight">${c.ten_bb}</span>
                    <span class="text-[9px] text-gray-500 font-normal mt-1 block normal-case">Cần: ${c.required_count}</span>
                </th>`;
            });
            html += `</tr>`;
            document.getElementById('thead').innerHTML = html;
        }

        function renderBody(data, config) {
            let html = '';
            data.forEach(row => {
                html += `<tr class="hover:bg-slate-50 transition-colors group">
                    <td class="p-2 font-bold text-slate-700 text-[12px] md:text-[13px] sticky-col bg-white text-left group-hover:bg-slate-50 border-r border-slate-200 truncate max-w-[12rem] md:max-w-[16rem]" title="${row.ten_duong_day}">${row.ten_duong_day}</td>`;
                
                config.forEach(c => {
                    const r = row.reports[c.bbkt_id];
                    const isMissing = r.actual < r.required;
                    const cellClass = isMissing ? 'cell-yellow' : 'text-slate-600';
                    
                    // Nén mảng details thành JSON string an toàn để truyền vào hàm onclick
                    const safeDetails = encodeURIComponent(JSON.stringify(r.details));

                    html += `<td class="p-1 md:p-1.5 text-center font-bold ${cellClass} border-r border-slate-100 last:border-r-0">
                        <button onclick="showDetails('${row.ma_thiet_bi}', '${c.bbkt_id}', '${row.ten_duong_day}', '${c.ten_bb}', '${safeDetails}')" 
                                class="w-full h-full py-1 px-1 rounded hover:bg-black/5 active:bg-black/10 transition-colors text-xs md:text-sm flex items-center justify-center cursor-pointer">
                            ${r.actual} <span class="text-[9px] md:text-[10px] font-medium opacity-50 mx-0.5">/</span> ${r.required}
                        </button>
                    </td>`;
                });
                html += `</tr>`;
            });
            document.getElementById('tbody').innerHTML = html;
        }

        function calculateSummary(data, config) {
            let statsHtml = '';
            config.forEach(c => {
                let totalActual = 0;
                let totalRequired = data.length * c.required_count;
                data.forEach(row => totalActual += row.reports[c.bbkt_id].actual);
                statsHtml += `<div class="flex items-center gap-1.5 bg-slate-700 px-2 py-0.5 rounded border border-slate-600 shadow-sm shrink-0">
                    <span class="text-[10px] text-slate-300 uppercase whitespace-nowrap">${c.ten_bb}</span>
                    <span class="text-xs font-black text-blue-400">${totalActual}/${totalRequired}</span>
                </div>`;
            });
            document.getElementById('summaryStats').innerHTML = statsHtml;
        }

        function showDetails(maThietBi, bbktId, lineName, reportName, encodedDetails) {
            document.getElementById('modalTitle').innerText = reportName;
            const details = JSON.parse(decodeURIComponent(encodedDetails));
            const todayStr = new Date().toISOString().split('T')[0];
            
            // 1. Phân đoạn hiển thị lịch sử nộp
            let html = `<div class="mb-2 text-[12px] md:text-[13px] text-slate-600 font-bold bg-slate-100 p-2 rounded border border-slate-200 truncate" title="${lineName}"><i class="fa-solid fa-location-dot mr-1 text-blue-500"></i> ${lineName}</div>`;
            
            if (details.length === 0) {
                html += '<p class="text-center text-slate-400 italic py-2 text-xs border-b border-dashed mb-2">Chưa có dữ liệu nộp nào.</p>';
            } else {
                html += '<div class="max-h-40 overflow-y-auto mb-2 border-b border-dashed border-slate-200 pb-2">';
                details.forEach((d, i) => {
                    html += `<div class="flex justify-between items-center bg-slate-50 p-2 rounded border border-slate-200 mb-1.5">
                        <div>
                            <p class="text-[9px] md:text-[10px] text-slate-500 uppercase font-bold">Lần ${details.length - i}</p>
                            <p class="font-bold text-slate-800 text-xs md:text-[13px] mt-0.5">${d.ngay}</p>
                        </div>
                        <a href="${d.url}" target="_blank" class="bg-blue-100 text-blue-700 px-2.5 py-1 rounded text-[10px] md:text-[11px] font-bold hover:bg-blue-200 flex items-center gap-1">
                            <i class="fa-solid fa-arrow-up-right-from-square"></i> Xem
                        </a>
                    </div>`;
                });
                html += '</div>';
            }

            // 2. Phân đoạn Form nộp mới (Tự động kế thừa biến maThietBi và bbktId)
            html += `
            <div class="bg-blue-50 p-3 rounded-lg border border-blue-100 mt-2">
                <p class="text-xs font-bold text-blue-800 uppercase mb-2"><i class="fa-solid fa-cloud-arrow-up mr-1"></i> Nộp Bổ Sung</p>
                <form id="inlineUploadForm" onsubmit="handleInlineUpload(event, '${maThietBi}', '${bbktId}')" class="space-y-2">
                    <div>
                        <label class="text-[10px] font-bold text-slate-600">Ngày kiểm tra:</label>
                        <input type="date" id="inline_ngay_kiem_tra" value="${todayStr}" required class="w-full p-1.5 border rounded text-xs outline-none focus:ring-1 focus:ring-blue-400">
                    </div>
                    <div>
                        <label class="text-[10px] font-bold text-slate-600">File báo cáo (Kế thừa tự động tên đường dây):</label>
                        <input type="file" id="inline_fileInput" required class="w-full text-[11px] file:mr-2 file:py-1 file:px-2 file:rounded file:border-0 file:bg-blue-600 file:text-white file:cursor-pointer hover:file:bg-blue-700 bg-white border rounded">
                    </div>
                    <button type="submit" id="inline_btnSubmit" class="w-full bg-slate-800 text-white font-bold py-2 rounded text-xs hover:bg-blue-600 transition-colors mt-2">
                        <i class="fa-solid fa-paper-plane mr-1"></i> Xác Nhận Tải Lên
                    </button>
                    <div id="inline_status" class="hidden text-[11px] text-center font-bold mt-1.5"></div>
                </form>
            </div>
            `;

            document.getElementById('modalBody').innerHTML = html;
            const modal = document.getElementById('modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        }

        // --- Hàm xử lý tải lên file trực tiếp từ Modal ---
        async function handleInlineUpload(e, ma_thiet_bi, bbkt_id) {
            e.preventDefault();
            const btn = document.getElementById('inline_btnSubmit');
            const status = document.getElementById('inline_status');
            const fileInput = document.getElementById('inline_fileInput');
            const ngay_kiem_tra = document.getElementById('inline_ngay_kiem_tra').value;
            const file = fileInput.files[0];

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin"></i> Đang tải lên Drive...';
            status.classList.add('hidden');

            try {
                const reader = new FileReader();
                reader.onload = async function() {
                    const base64Data = reader.result.split(',')[1];
                    
                    // Gửi lên Google Drive kèm tham số để tự đổi tên file chuẩn
                    const response = await fetch(googleScriptUrl, {
                        method: 'POST',
                        body: JSON.stringify({ 
                            fileName: file.name, 
                            mimeType: file.type, 
                            base64: base64Data,
                            ma_thiet_bi: ma_thiet_bi,
                            bbkt_id: bbkt_id,
                            ngay_kiem_tra: ngay_kiem_tra
                        })
                    });
                    
                    const result = await response.json();
                    
                    if(result.status === 'success') {
                        // Lưu vào Supabase
                        const { error } = await db.from('bbkt').insert([
                            { ma_thiet_bi: ma_thiet_bi, bbkt_id: bbkt_id, file_url: result.url, thoi_gian: ngay_kiem_tra }
                        ]);

                        if(error) throw error;

                        status.classList.remove('hidden');
                        status.className = "text-[11px] text-center font-bold mt-2 p-1.5 bg-green-100 text-green-700 rounded";
                        status.innerHTML = '✅ Tải lên thành công!';
                        btn.innerHTML = 'Đang làm mới bảng...';
                        
                        // Đóng modal và tải lại bảng sau 1.5 giây
                        setTimeout(() => {
                            toggleModal();
                            init();
                        }, 1500);

                    } else {
                        throw new Error(result.message);
                    }
                };
                reader.readAsDataURL(file);
                
            } catch (err) {
                status.classList.remove('hidden');
                status.className = "text-[11px] text-center font-bold mt-2 p-1.5 bg-red-100 text-red-700 rounded";
                status.innerHTML = '❌ Lỗi: ' + err.message;
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-rotate-right"></i> Thử lại';
            }
        }

        function filterTable() {
            const input = document.getElementById("nameFilter").value.toUpperCase();
            const tr = document.getElementById("tbody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    let textValue = td.textContent || td.innerText;
                    tr[i].style.display = textValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }

        function toggleModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-active');
        }

        init();
    </script>
</body>
</html>
