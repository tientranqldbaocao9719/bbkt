<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Quản Lý Báo Cáo Kỹ Thuật</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { overflow: hidden; } 
        .modal { transition: opacity 0.2s ease; }
        body.modal-active { overflow: hidden; }
        .table-container { height: calc(100vh - 150px); overflow: auto; -webkit-overflow-scrolling: touch; background: #fff; }
        table { border-collapse: separate; border-spacing: 0; width: 100%; }
        th { background-color: #f8fafc; position: sticky; top: 0; z-index: 20; border-bottom: 1px solid #cbd5e1; border-right: 1px solid #cbd5e1; padding: 12px 8px; text-align: center; vertical-align: middle; }
        td { border-bottom: 1px solid #e2e8f0; border-right: 1px solid #e2e8f0; padding: 0; height: 44px; }
        .sticky-col { position: sticky; left: 0; z-index: 10; text-align: left; padding: 10px 12px; font-size: 13px; font-weight: 700; color: #334155; background-color: #ffffff; box-shadow: inset -1px 0 0 #cbd5e1; }
        th.sticky-col { z-index: 30; background-color: #f8fafc; }
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .hide-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
        #searchDropdown::-webkit-scrollbar { width: 6px; }
        #searchDropdown::-webkit-scrollbar-track { background: #f1f5f9; }
        #searchDropdown::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50 font-sans text-slate-800 antialiased h-screen flex flex-col">

    <nav class="bg-slate-900 p-3 md:px-5 shadow z-50 shrink-0">
        <div class="mx-auto flex flex-wrap justify-between items-center gap-3">
            <div class="text-white font-bold text-lg md:text-xl flex items-center tracking-wide">
                <i class="fa-solid fa-bolt mr-2 text-blue-400"></i> APP QUẢN LÝ BÁO CÁO
            </div>
            <div class="flex items-center gap-3">
                <div class="bg-slate-800 flex items-center rounded border border-slate-600 overflow-hidden shadow-inner">
                    <span class="px-3 text-slate-300 text-sm font-bold hidden md:inline bg-slate-800">Năm</span>
                    <input type="number" id="yearPicker" class="p-1.5 md:p-2 bg-slate-700 text-white font-bold text-sm outline-none cursor-pointer w-20 text-center" onchange="init()" onkeyup="if(event.key === 'Enter') init()">
                </div>
                <a href="admin.html" class="bg-red-600 text-white px-4 py-1.5 md:py-2 rounded shadow-md text-xs md:text-sm font-bold hover:bg-red-500 transition-colors cursor-pointer">Admin</a>
                <a href="manage.html" class="bg-indigo-600 text-white px-4 py-1.5 md:py-2 rounded shadow-md text-xs md:text-sm font-bold hover:bg-indigo-500 transition-colors cursor-pointer"><i class="fa-solid fa-gears"></i> Cấu hình</a>
            </div>
        </div>
    </nav>

    <div class="bg-slate-900 border-b border-slate-800 pb-3 pt-1 px-5 shrink-0 shadow-sm overflow-x-auto hide-scrollbar">
        <div id="summaryStats" class="flex gap-3 md:justify-start min-w-max">
            <span class="text-slate-400 text-xs italic px-2">Đang tải thống kê...</span>
        </div>
    </div>

    <div class="flex-1 flex flex-col min-h-0 bg-white">
        <div class="p-2 border-b border-slate-200 bg-white flex flex-col sm:flex-row justify-between items-center gap-2 shrink-0">
            <div class="flex flex-col sm:flex-row items-center gap-2 w-full sm:w-auto">
                <div class="relative w-full sm:w-[350px]">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400"><i class="fa-solid fa-magnifying-glass"></i></span>
                    <input type="text" id="nameFilter" onkeyup="handleSearchInput(event)" placeholder="Gõ tìm hoặc chọn đường dây..." autocomplete="off" class="pl-9 pr-8 py-1.5 w-full border border-slate-300 rounded focus:ring-2 focus:ring-blue-400 outline-none text-sm bg-slate-50">
                    <button id="clearSearch" onclick="clearSearchFilter()" class="absolute inset-y-0 right-0 hidden items-center pr-3 text-slate-400 hover:text-red-500">
                        <i class="fa-solid fa-xmark"></i>
                    </button>
                    <ul id="searchDropdown" class="absolute z-50 w-full bg-white border border-slate-300 rounded-b shadow-2xl max-h-60 overflow-y-auto hidden top-full left-0 mt-1"></ul>
                </div>
                <div class="relative w-full sm:w-auto">
                    <select id="colFilter" onchange="filterColumns()" class="w-full sm:w-auto pl-3 pr-8 py-1.5 border border-blue-300 rounded focus:ring-2 focus:ring-blue-400 outline-none text-sm bg-blue-50 text-blue-800 font-bold cursor-pointer appearance-none shadow-sm">
                        <option value="ALL">Hiển thị tất cả biên bản</option>
                    </select>
                    <span class="absolute inset-y-0 right-0 flex items-center pr-2 pointer-events-none text-blue-600"><i class="fa-solid fa-filter"></i></span>
                </div>
            </div>
            <div class="text-[11px] text-slate-600 font-medium whitespace-nowrap hidden lg:flex items-center gap-3 pr-2">
                <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-sm bg-yellow-100 border border-yellow-300 inline-block"></span> Vi phạm KPI / Chu kỳ</span>
                <span class="flex items-center gap-1.5"><span class="w-3.5 h-3.5 rounded-sm bg-slate-100 border border-slate-300 inline-block"></span> Không áp dụng</span>
            </div>
        </div>

        <div class="table-container w-full relative flex-1">
            <table id="reportTable">
                <thead id="thead"></thead>
                <tbody id="tbody" class="divide-y divide-slate-200">
                    <tr><td colspan="10" class="p-10 text-center font-bold text-blue-500 animate-pulse text-sm border-none">Supabase đang đồng bộ dữ liệu...</td></tr>
                </tbody>
            </table>
        </div>
    </div>

    <div id="modal" class="modal opacity-0 pointer-events-none fixed inset-0 flex items-center justify-center z-[100] px-3">
        <div class="modal-overlay absolute inset-0 bg-slate-900 bg-opacity-60 backdrop-blur-sm" onclick="toggleModal()"></div>
        <div class="modal-container bg-white w-full max-w-lg mx-auto rounded-xl shadow-2xl z-50 overflow-hidden flex flex-col max-h-[90vh]">
            <div class="py-3 px-5 bg-slate-50 border-b flex justify-between items-center shrink-0">
                <p class="text-base font-black text-slate-800 truncate pr-4 uppercase" id="modalTitle">Chi tiết</p>
                <div class="cursor-pointer bg-slate-200 hover:bg-slate-300 rounded-full w-8 h-8 flex items-center justify-center transition-colors" onclick="toggleModal()">
                    <i class="fa-solid fa-xmark text-slate-600"></i>
                </div>
            </div>
            <div id="modalBody" class="p-4 md:p-5 space-y-3 overflow-y-auto bg-white flex-1">
            </div>
        </div>
    </div>

    <iframe id="upload_iframe" name="upload_iframe" class="hidden" style="display:none;"></iframe>

    <script>
        // --- CẤU HÌNH API ---
        const supabaseUrl = 'https://exovpqkfcdoaubkmmgii.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b3ZwcWtmY2RvYXVia21tZ2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODU5MjgsImV4cCI6MjA5NDk2MTkyOH0.J6t8K8hrXuKleZ-qvL7FXJmJQydVvP45vwiykAp4NUw';
        const db = supabase.createClient(supabaseUrl, supabaseKey);
        
        // Nhớ thay thế Google Script URL của bạn sau khi đã deploy code .gs mới
        const googleScriptUrl = 'https://script.google.com/macros/s/AKfycbxFJCC2m3zTMXa859rc46TTqAWHhWojfdkidkOzshvNLzAN7Cm4v02P2DrKxnvMujottA/exec';

        let allLineNames = []; 
        const currentYear = new Date().getFullYear();
        document.getElementById('yearPicker').value = currentYear;

        // --- LẮNG NGHE KẾT QUẢ TỪ GOOGLE APPS SCRIPT TRẢ VỀ ---
        window.addEventListener('message', async function(event) {
            const data = event.data;
            if (!data || !data.status) return;

            const btn = document.getElementById('inline_btnSubmit');
            const status = document.getElementById('inline_status');
            const fileInput = document.getElementById('inline_fileInput');

            if (data.status === 'success') {
                try {
                    // Cập nhật link file vào Supabase
                    const { error } = await db.from('bbkt').insert([
                        { ma_thiet_bi: data.ma_thiet_bi, bbkt_id: data.bbkt_id, file_url: data.url, thoi_gian: data.ngay_kiem_tra }
                    ]);

                    if (error) throw error;

                    status.classList.remove('hidden');
                    status.className = "text-xs text-center font-bold mt-3 p-2 bg-green-100 text-green-700 rounded border border-green-200";
                    status.innerHTML = '<i class="fa-solid fa-check mr-1"></i> Tải lên Google Drive thành công!';
                    btn.innerHTML = 'Đang làm mới bảng...';
                    
                    if(fileInput) fileInput.value = ''; // Reset input
                    setTimeout(() => { toggleModal(); init(); }, 1000);

                } catch (dbErr) {
                    status.classList.remove('hidden');
                    status.className = "text-xs text-center font-bold mt-3 p-2 bg-red-100 text-red-700 rounded border border-red-200";
                    status.innerHTML = '<i class="fa-solid fa-xmark mr-1"></i> Lỗi lưu DB: ' + dbErr.message;
                    btn.disabled = false;
                    btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-1"></i> Thử lại';
                }
            } else if (data.status === 'error') {
                status.classList.remove('hidden');
                status.className = "text-xs text-center font-bold mt-3 p-2 bg-red-100 text-red-700 rounded border border-red-200";
                status.innerHTML = '<i class="fa-solid fa-xmark mr-1"></i> Lỗi Drive: ' + data.message;
                btn.disabled = false;
                btn.innerHTML = '<i class="fa-solid fa-paper-plane mr-1"></i> Thử lại';
            }
        });

        // --- HÀM KHỞI TẠO DỮ LIỆU CHÍNH ---
        async function init() {
            const year = document.getElementById('yearPicker').value;
            if(!year) return;

            const { data, error } = await db.rpc('get_yearly_report_summary', { target_year: parseInt(year) });
            if (error) { console.error(error); alert("Lỗi tải dữ liệu!"); return; }

            // Sắp xếp mảng data theo Tên Đường Dây (A-Z)
            data.data.sort((a, b) => a.ten_duong_day.localeCompare(b.ten_duong_day, 'vi'));

            allLineNames = data.data.map(d => d.ten_duong_day);

            let totalActualOverall = 0;
            let totalReqCurrentOverall = 0;
            let totalReqYearOverall = 0;
            let filterHtml = '<option value="ALL">Hiển thị tất cả biên bản</option>';

            data.config.forEach((c, index) => {
                c.colActual = 0;
                c.colReqCurrent = 0;
                c.colReqYear = 0;
                
                const tanSuat = parseInt(c.tan_suat) || 12;
                const reqYearPerLine = Math.floor(12 / tanSuat);

                data.data.forEach(row => { 
                    const r = row.reports[c.bbkt_id];
                    const isApp = r && (r.is_applicable !== false); 
                    
                    if (isApp) {
                        c.colActual += parseInt(r.actual || 0);
                        c.colReqCurrent += parseInt(r.required || 0);
                        c.colReqYear += reqYearPerLine;
                    }
                });

                totalActualOverall += c.colActual;
                totalReqCurrentOverall += c.colReqCurrent;
                totalReqYearOverall += c.colReqYear;
                
                filterHtml += `<option value="${index}">${c.ten_bb.replace(/biên bản /gi, '').trim()}</option>`;
            });

            document.getElementById('colFilter').innerHTML = filterHtml;

            renderKPIs(totalActualOverall, totalReqCurrentOverall, totalReqYearOverall, parseInt(year));
            renderHeader(data.config);
            renderBody(data.data, data.config);
            
            filterColumns(); 
        }

        // --- RENDER DẢI KPI ---
        function renderKPIs(actual, reqCurrent, reqYear, selectedYear) {
            const currentYear = new Date().getFullYear();
            const currentMonth = selectedYear < currentYear ? 12 : (selectedYear === currentYear ? new Date().getMonth() + 1 : 'Tương lai');

            let statsHtml = `
                <div class="border border-slate-500 bg-slate-800 px-4 py-2 rounded text-white shadow flex items-center gap-2 hover:bg-slate-700 transition-colors">
                    <span class="text-sm font-bold text-slate-300">Đến Tháng ${currentMonth}:</span>
                    <span class="text-base font-black text-blue-400">${actual}/${reqCurrent}</span>
                </div>
                <div class="border border-slate-500 bg-slate-800 px-4 py-2 rounded text-white shadow flex items-center gap-2 hover:bg-slate-700 transition-colors">
                    <span class="text-sm font-bold text-slate-300">Cả Năm:</span>
                    <span class="text-base font-black text-blue-400">${actual}/${reqYear}</span>
                </div>
            `;
            document.getElementById('summaryStats').innerHTML = statsHtml;
        }

        // --- RENDER TIÊU ĐỀ BẢNG ---
        function renderHeader(config) {
            let html = `<tr><th class="sticky-col min-w-[200px] max-w-[300px]">TÊN ĐƯỜNG DÂY</th>`;
            config.forEach(c => {
                const shortName = c.ten_bb.replace(/biên bản /gi, '').trim();
                
                html += `<th class="min-w-[100px]">
                    <div class="text-slate-700 whitespace-normal uppercase font-bold text-[11px] leading-snug">${shortName}</div>
                    <div class="mt-1.5 flex items-center justify-center">
                        <span class="inline-flex items-center gap-1.5 bg-blue-50 border border-blue-200 text-blue-700 text-[10px] font-black px-2.5 py-0.5 rounded-full shadow-sm">
                            <i class="fa-solid fa-chart-pie opacity-50 text-[9px]"></i> ${c.colActual} / ${c.colReqCurrent}
                        </span>
                    </div>
                </th>`;
            });
            html += `</tr>`;
            document.getElementById('thead').innerHTML = html;
        }

        // --- RENDER NỘI DUNG BẢNG ---
        function renderBody(data, config) {
            let html = '';
            data.forEach(row => {
                let badge = '';
                
                if(row.loai_dday === 'CAP_NGAM') {
                    badge += '<span class="ml-2 bg-blue-100 text-blue-700 px-1.5 py-0.5 rounded text-[9px] uppercase font-bold">Cáp ngầm</span>';
                }
                else if(row.loai_dday === 'HON_HOP') {
                    badge += '<span class="ml-2 bg-yellow-100 text-yellow-700 px-1.5 py-0.5 rounded text-[9px] uppercase font-bold">Hỗn hợp</span>';
                }

                if(row.tinhtrang === 'Vận hành') {
                    badge += '<span class="ml-2 bg-green-100 text-green-700 px-1.5 py-0.5 rounded text-[9px] uppercase font-bold">Vận hành</span>';
                } 
                else if(row.tinhtrang === 'Không vận hành') {
                    badge += '<span class="ml-2 bg-slate-100 text-slate-500 px-1.5 py-0.5 rounded text-[9px] uppercase font-bold border border-slate-200">Không vận hành</span>';
                }

                html += `<tr class="hover:bg-blue-50/50 transition-colors">
                    <td class="sticky-col whitespace-normal leading-snug min-w-[200px] max-w-[300px]" title="${row.ten_duong_day}">${row.ten_duong_day}${badge}</td>`;
                
                config.forEach(c => {
                    const r = row.reports[c.bbkt_id];
                    const isApp = r && (r.is_applicable !== false);
                    
                    if (!isApp) {
                        html += `
                        <td class="bg-slate-50 border-slate-200 cursor-not-allowed">
                            <div class="w-full h-full flex items-center justify-center text-slate-300 font-bold text-lg" title="Không áp dụng">
                                <i class="fa-solid fa-minus"></i>
                            </div>
                        </td>`;
                    } 
                    else {
                        const isMissing = (r.actual < r.required) || (r.is_compliant === false);
                        const bgClass = isMissing ? 'bg-yellow-100 hover:brightness-95' : 'bg-transparent hover:bg-slate-100';
                        const textClass = isMissing ? 'text-yellow-800' : 'text-slate-600';
                        const safeDetails = encodeURIComponent(JSON.stringify(r.details));

                        html += `
                        <td class="${bgClass} cursor-pointer transition-all" onclick="showDetails('${row.ma_thiet_bi}', '${c.bbkt_id}', '${row.ten_duong_day}', '${c.ten_bb}', '${safeDetails}')">
                            <div class="w-full h-full flex items-center justify-center font-bold text-[13px] ${textClass}">
                                ${r.actual} <span class="text-[10px] opacity-50 mx-1">/</span> ${r.required}
                            </div>
                        </td>`;
                    }
                });
                html += `</tr>`;
            });
            document.getElementById('tbody').innerHTML = html;
        }

        // --- XỬ LÝ THANH TÌM KIẾM AUTOCOMPLETE ---
        function handleSearchInput(e) {
            const inputVal = e.target.value.toLowerCase();
            const dropdown = document.getElementById('searchDropdown');
            const clearBtn = document.getElementById('clearSearch');
            dropdown.innerHTML = '';

            filterTable();

            if (!inputVal) {
                dropdown.classList.add('hidden');
                clearBtn.style.display = 'none';
                return;
            }
            
            clearBtn.style.display = 'flex';
            const filteredNames = allLineNames.filter(n => n.toLowerCase().includes(inputVal));
            
            if (filteredNames.length > 0) {
                filteredNames.forEach(name => {
                    const li = document.createElement('li');
                    li.className = 'p-3 text-sm hover:bg-blue-50 hover:text-blue-700 cursor-pointer border-b border-slate-100 last:border-b-0 text-slate-700 transition-colors whitespace-normal leading-snug';
                    li.textContent = name;
                    li.onclick = () => {
                        document.getElementById('nameFilter').value = name;
                        dropdown.classList.add('hidden');
                        filterTable(); 
                    };
                    dropdown.appendChild(li);
                });
                dropdown.classList.remove('hidden');
            } else {
                dropdown.classList.add('hidden');
            }
        }

        function clearSearchFilter() {
            const input = document.getElementById('nameFilter');
            input.value = '';
            document.getElementById('clearSearch').style.display = 'none';
            document.getElementById('searchDropdown').classList.add('hidden');
            filterTable();
        }

        document.addEventListener('click', (e) => {
            const searchContainer = document.getElementById('nameFilter').parentElement;
            if (!searchContainer.contains(e.target)) {
                document.getElementById('searchDropdown').classList.add('hidden');
            }
        });

        // --- XỬ LÝ ẨN/HIỆN CỘT ---
        function filterColumns() {
            const selectedIdx = document.getElementById("colFilter").value;
            const table = document.getElementById("reportTable");
            const rows = table.getElementsByTagName("tr");

            for (let i = 0; i < rows.length; i++) {
                const cells = rows[i].children; 
                for (let j = 1; j < cells.length; j++) {
                    if (selectedIdx === "ALL" || parseInt(selectedIdx) === (j - 1)) {
                        cells[j].style.display = "";
                    } else {
                        cells[j].style.display = "none";
                    }
                }
            }
        }

        function filterTable() {
            const input = document.getElementById("nameFilter").value.toUpperCase();
            const tr = document.getElementById("tbody").getElementsByTagName("tr");
            for (let i = 0; i < tr.length; i++) {
                let td = tr[i].getElementsByTagName("td")[0];
                if (td) {
                    let textValue = td.textContent || td.innerText;
                    tr[i].style.display = textValue.toUpperCase().indexOf(input) > -1 ? "" : "none";
                }
            }
        }

        // --- GIAO DIỆN MODAL NỘP FILE ---
        function showDetails(maThietBi, bbktId, lineName, reportName, encodedDetails) {
            document.getElementById('modalTitle').innerText = reportName;
            const details = JSON.parse(decodeURIComponent(encodedDetails));
            const todayStr = new Date().toISOString().split('T')[0];
            
            let html = `<div class="text-[13px] text-slate-700 font-bold bg-slate-100 p-3 rounded-lg border border-slate-200 mb-3"><i class="fa-solid fa-location-dot mr-1.5 text-blue-500"></i> ${lineName}</div>`;
            
            if (details.length === 0) {
                html += '<p class="text-center text-slate-400 italic py-4 text-xs border-b border-dashed border-slate-300 mb-4">Chưa có dữ liệu nộp nào.</p>';
            } else {
                html += '<div class="max-h-48 overflow-y-auto mb-4 border-b border-dashed border-slate-300 pb-4 space-y-2">';
                details.forEach((d) => {
                    const month = parseInt(d.ngay.split('/')[1]); 
                    html += `<div class="flex justify-between items-center bg-white p-3 rounded-lg border border-slate-200 shadow-sm hover:border-blue-300 transition-colors">
                        <div>
                            <p class="text-[10px] text-blue-600 uppercase font-black bg-blue-50 px-2 py-0.5 rounded inline-block mb-1">THÁNG ${month}</p>
                            <p class="font-bold text-slate-800 text-[13px]">${d.ngay}</p>
                        </div>
                        <a href="${d.url}" target="_blank" class="bg-slate-100 text-slate-700 px-3 py-1.5 rounded text-xs font-bold hover:bg-slate-200 flex items-center gap-1.5 border border-slate-200">
                            <i class="fa-solid fa-file-pdf text-red-500"></i> Xem
                        </a>
                    </div>`;
                });
                html += '</div>';
            }

            html += `
            <div class="bg-blue-50 p-4 rounded-xl border border-blue-100">
                <p class="text-[13px] font-black text-blue-800 uppercase mb-3"><i class="fa-solid fa-cloud-arrow-up mr-1 text-base"></i> Nộp Bổ Sung</p>
                <form id="inlineUploadForm" onsubmit="handleInlineUpload(event, '${maThietBi}', '${bbktId}')" class="space-y-3">
                    <div>
                        <label class="block text-[11px] font-bold text-slate-700 mb-1">Ngày kiểm tra thực tế:</label>
                        <input type="date" id="inline_ngay_kiem_tra" value="${todayStr}" required class="w-full p-2 border border-slate-300 rounded text-[13px] outline-none focus:ring-2 focus:ring-blue-400 bg-white">
                    </div>
                    <div>
                        <label class="block text-[11px] font-bold text-slate-700 mb-1">File báo cáo (Tự kế thừa tên đường dây):</label>
                        <div class="border border-dashed border-slate-300 rounded p-1.5 bg-white">
                            <input type="file" id="inline_fileInput" required class="w-full text-xs text-slate-500 file:mr-2 file:py-1.5 file:px-3 file:rounded file:border-0 file:bg-slate-800 file:text-white file:font-bold file:cursor-pointer hover:file:bg-slate-700 cursor-pointer">
                        </div>
                    </div>
                    <button type="submit" id="inline_btnSubmit" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded text-[13px] hover:bg-blue-700 transition-colors mt-2 shadow">
                        <i class="fa-solid fa-paper-plane mr-1"></i> Xác Nhận Tải Lên
                    </button>
                    <div id="inline_status" class="hidden text-xs text-center font-bold mt-2"></div>
                </form>
            </div>
            `;

            document.getElementById('modalBody').innerHTML = html;
            const modal = document.getElementById('modal');
            modal.classList.remove('opacity-0', 'pointer-events-none');
            document.body.classList.add('modal-active');
        }

        function toggleModal() {
            const modal = document.getElementById('modal');
            modal.classList.add('opacity-0', 'pointer-events-none');
            document.body.classList.remove('modal-active');
        }

        // --- HÀM UPLOAD MỚI (DÙNG NATIVE FORM BYPASS BASE64) ---
        function handleInlineUpload(e, ma_thiet_bi, bbkt_id) {
            e.preventDefault();
            const btn = document.getElementById('inline_btnSubmit');
            const status = document.getElementById('inline_status');
            const fileInput = document.getElementById('inline_fileInput');
            const ngay_kiem_tra = document.getElementById('inline_ngay_kiem_tra').value;

            if (!fileInput.files.length) return;

            btn.disabled = true;
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-1"></i> Đang tải file lên Drive...';
            status.classList.add('hidden');

            // Tạo một form ảo bắn thẳng dữ liệu qua iframe ẩn
            const form = document.createElement('form');
            form.action = googleScriptUrl;
            form.method = 'POST';
            form.enctype = 'multipart/form-data'; // Bắt buộc để gửi file nguyên bản
            form.target = 'upload_iframe'; // Trỏ target vào iframe ẩn

            // Clone lại input file để đưa vào form ảo
            const clonedFileInput = fileInput.cloneNode(true);
            clonedFileInput.name = 'file';
            form.appendChild(clonedFileInput);

            // Gắn thêm các metadata
            const inputs = {
                'ma_thiet_bi': ma_thiet_bi,
                'bbkt_id': bbkt_id,
                'ngay_kiem_tra': ngay_kiem_tra
            };

            for (const [key, value] of Object.entries(inputs)) {
                const hiddenInput = document.createElement('input');
                hiddenInput.type = 'hidden';
                hiddenInput.name = key;
                hiddenInput.value = value;
                form.appendChild(hiddenInput);
            }

            // Gắn form vào body, submit, rồi dọn dẹp ngay
            document.body.appendChild(form);
            form.submit();
            document.body.removeChild(form);
        }

        init();
    </script>
