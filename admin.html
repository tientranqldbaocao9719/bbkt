<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin - Duyệt Báo Cáo</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        .sticky-col { position: sticky; left: 0; background-color: #ffffff; z-index: 20; border-right: 1px solid #e2e8f0; }
        .sticky-header { position: sticky; top: 0; z-index: 30; }
        .table-container { height: calc(100vh - 230px); overflow: auto; -webkit-overflow-scrolling: touch; }
        td, th { padding: 10px 12px; font-size: 13px; text-align: center; white-space: nowrap; }
        ::-webkit-scrollbar { width: 6px; height: 6px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 3px; }
    </style>
</head>
<body class="bg-slate-50 font-sans leading-tight text-slate-800 antialiased h-screen overflow-hidden flex flex-col">

    <nav class="bg-slate-900 p-3 md:px-5 shadow z-50 shrink-0 border-b-2 border-red-500">
        <div class="mx-auto flex flex-wrap justify-between items-center gap-2">
            <div class="text-white font-bold text-base md:text-lg flex items-center">
                <i class="fa-solid fa-user-shield mr-2 text-red-400"></i> QUẢN TRỊ VIÊN (XEM LỊCH SỬ NỘP)
            </div>
            <div class="flex items-center gap-2">
                <a href="index.html" class="bg-slate-700 text-white px-4 py-2 rounded shadow-md text-sm font-bold border border-transparent hover:bg-slate-600 transition-colors flex items-center gap-2">
                    <i class="fa-solid fa-arrow-left"></i> Về Dashboard
                </a>
            </div>
        </div>
    </nav>

    <div class="p-2 md:p-4 w-full flex-1 flex flex-col min-h-0 gap-3">
        
        <div class="bg-white rounded shadow-sm border border-slate-200 p-3 shrink-0 flex flex-wrap items-end gap-3 z-10">
            <div class="flex-1 min-w-[200px]">
                <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Tên Đường Dây</label>
                <div class="relative">
                    <span class="absolute inset-y-0 left-0 flex items-center pl-2.5 text-slate-400"><i class="fa-solid fa-magnifying-glass text-xs"></i></span>
                    <input type="text" id="searchName" placeholder="Gõ từ khóa..." class="w-full pl-8 pr-3 py-1.5 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-blue-400 outline-none">
                </div>
            </div>
            <div class="flex-1 min-w-[150px]">
                <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Loại Biên Bản</label>
                <select id="filterType" class="w-full px-3 py-1.5 border border-slate-300 rounded text-sm focus:ring-2 focus:ring-blue-400 outline-none bg-white">
                    <option value="">-- Tất cả biên bản --</option>
                </select>
            </div>
            <div class="w-[130px]">
                <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Từ ngày</label>
                <input type="date" id="filterStartDate" class="w-full px-2 py-1.5 border border-slate-300 rounded text-xs focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <div class="w-[130px]">
                <label class="block text-[11px] font-bold text-slate-500 uppercase mb-1">Đến ngày</label>
                <input type="date" id="filterEndDate" class="w-full px-2 py-1.5 border border-slate-300 rounded text-xs focus:ring-2 focus:ring-blue-400 outline-none">
            </div>
            <div class="flex gap-2">
                <button onclick="applyFilters()" class="bg-blue-600 text-white px-4 py-1.5 rounded text-sm font-bold hover:bg-blue-700 transition-colors shadow">
                    Lọc
                </button>
                <button onclick="clearFilters()" class="bg-slate-200 text-slate-700 px-3 py-1.5 rounded text-sm font-bold hover:bg-slate-300 transition-colors shadow-sm" title="Xóa bộ lọc">
                    <i class="fa-solid fa-rotate-right"></i>
                </button>
            </div>
        </div>

        <div class="bg-white rounded shadow-md flex flex-col h-full border border-slate-200 overflow-hidden relative">
            
            <div class="table-container w-full bg-white relative flex-1 border-b border-slate-200">
                <table class="w-full text-left border-collapse" id="adminTable">
                    <thead class="sticky-header shadow-sm bg-slate-100 uppercase text-[11px] text-slate-600 tracking-wide">
                        <tr>
                            <th class="p-3 sticky-col top-0 font-bold border-b border-slate-300 min-w-[140px] z-[35]">Hành Động</th>
                            <th class="p-3 border-b border-slate-300 w-28">Ngày Kiểm Tra</th>
                            <th class="p-3 border-b border-slate-300 text-left min-w-[200px]">Tên Đường Dây</th>
                            <th class="p-3 border-b border-slate-300">Loại Biên Bản</th>
                            <th class="p-3 border-b border-slate-300">File Đính Kèm</th>
                        </tr>
                    </thead>
                    <tbody id="tbody" class="divide-y divide-slate-200 bg-white">
                        <tr><td colspan="5" class="p-10 text-center font-bold text-blue-500 animate-pulse text-sm">Đang tải dữ liệu...</td></tr>
                    </tbody>
                </table>
            </div>

            <div class="bg-slate-50 p-3 flex justify-between items-center shrink-0">
                <div class="text-xs font-bold text-slate-600" id="pageInfo">
                    Đang tải dữ liệu...
                </div>
                <div class="flex items-center gap-2">
                    <button id="btnPrev" onclick="changePage(-1)" class="bg-white border border-slate-300 text-slate-700 px-3 py-1.5 rounded text-xs font-bold hover:bg-slate-100 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                        <i class="fa-solid fa-chevron-left mr-1"></i> Trang trước
                    </button>
                    <button id="btnNext" onclick="changePage(1)" class="bg-white border border-slate-300 text-slate-700 px-3 py-1.5 rounded text-xs font-bold hover:bg-slate-100 transition-colors disabled:opacity-50 disabled:cursor-not-allowed shadow-sm">
                        Trang sau <i class="fa-solid fa-chevron-right ml-1"></i>
                    </button>
                </div>
            </div>

        </div>
    </div>

    <div id="modal-edit-date" class="hidden fixed inset-0 flex items-center justify-center z-50 px-4">
        <div class="absolute inset-0 bg-slate-900 bg-opacity-50" onclick="closeEditModal()"></div>
        <div class="bg-white rounded-xl shadow-2xl w-full max-w-sm z-10 overflow-hidden">
            <div class="bg-blue-50 p-4 border-b border-blue-100 flex justify-between items-center">
                <h3 class="font-black text-blue-800 uppercase text-lg">Sửa Ngày Kiểm Tra</h3>
                <button onclick="closeEditModal()" class="text-slate-500 hover:text-red-500"><i class="fa-solid fa-xmark text-xl"></i></button>
            </div>
            <form onsubmit="saveNewDate(event)" class="p-5 space-y-4">
                <input type="hidden" id="edit_baocao_id">
                <div>
                    <label class="block text-xs font-bold text-slate-700 uppercase mb-1">Ngày kiểm tra mới</label>
                    <input type="date" id="edit_ngay_kiem_tra" required class="w-full p-2 border border-slate-300 rounded outline-none focus:ring-2 focus:ring-blue-400 bg-slate-50">
                </div>
                <button type="submit" id="btnSaveDate" class="w-full bg-blue-600 text-white font-bold py-2.5 rounded hover:bg-blue-700 mt-2 transition-colors shadow">
                    <i class="fa-solid fa-floppy-disk mr-2"></i> Lưu Cập Nhật
                </button>
            </form>
        </div>
    </div>

    <script>
        const supabaseUrl = 'https://exovpqkfcdoaubkmmgii.supabase.co';
        const supabaseKey = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImV4b3ZwcWtmY2RvYXVia21tZ2lpIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzkzODU5MjgsImV4cCI6MjA5NDk2MTkyOH0.J6t8K8hrXuKleZ-qvL7FXJmJQydVvP45vwiykAp4NUw';
        const db = supabase.createClient(supabaseUrl, supabaseKey);

        let isAdminVerified = false; 

        // Khai báo các biến phục vụ phân trang
        let currentPage = 1;
        const itemsPerPage = 50; 
        let totalItems = 0;

        function verifyAdmin() {
            if (isAdminVerified) return true;
            let pass = prompt("⛔ YÊU CẦU QUYỀN QUẢN TRỊ VÀ ĐIỀU HÀNH!\nVui lòng nhập mật khẩu để thao tác:");
            if (pass === "111986") {
                isAdminVerified = true;
                return true;
            }
            alert("❌ Mật khẩu không chính xác. Từ chối thao tác!");
            return false;
        }

        // [THÊM MỚI] Tự động tải danh sách "Loại biên bản" vào select box
        async function loadFilterOptions() {
            const { data, error } = await db.from('dmbb').select('ten_bb');
            if (!error && data) {
                const select = document.getElementById('filterType');
                data.forEach(item => {
                    const opt = document.createElement('option');
                    opt.value = item.ten_bb;
                    opt.textContent = item.ten_bb;
                    select.appendChild(opt);
                });
            }
        }

        // [CẬP NHẬT] Hàm gọi dữ liệu có tích hợp các điều kiện lọc
        async function loadAdminData() {
            try {
                const fromIndex = (currentPage - 1) * itemsPerPage;
                const toIndex = fromIndex + itemsPerPage - 1;

                // Khởi tạo câu query cơ bản
                let query = db.from('admin_recent_reports').select('*', { count: 'exact' });

                // Lấy giá trị từ bộ lọc
                const searchName = document.getElementById('searchName').value.trim();
                const filterType = document.getElementById('filterType').value;
                const filterStartDate = document.getElementById('filterStartDate').value;
                const filterEndDate = document.getElementById('filterEndDate').value;

                // Nối các điều kiện tìm kiếm vào query nếu người dùng có nhập
                if (searchName) {
                    query = query.ilike('ten_duong_day', `%${searchName}%`);
                }
                if (filterType) {
                    query = query.eq('ten_bb', filterType);
                }
                if (filterStartDate) {
                    // Cần cộng thêm giờ phút giây để bao quát trọn ngày
                    query = query.gte('thoi_gian', filterStartDate + 'T00:00:00');
                }
                if (filterEndDate) {
                    query = query.lte('thoi_gian', filterEndDate + 'T23:59:59');
                }

                // Thực thi câu lệnh, luôn xếp mới nhất lên đầu
                const { data, count, error } = await query
                    .order('thoi_gian', { ascending: false })
                    .range(fromIndex, toIndex);

                if (error) throw error;
                if (count !== null) totalItems = count;

                let html = '';
                if (data.length === 0) {
                    html = `<tr><td colspan="5" class="p-10 text-center text-slate-500 font-bold">Không tìm thấy báo cáo nào phù hợp với bộ lọc.</td></tr>`;
                } else {
                    data.forEach(r => {
                        const rawDate = r.thoi_gian.split('T')[0];
                        const dDate = new Date(r.thoi_gian);
                        const dateStr = `${dDate.getDate().toString().padStart(2, '0')}/${(dDate.getMonth()+1).toString().padStart(2, '0')}/${dDate.getFullYear()}`;

                        html += `<tr class="hover:bg-slate-50 transition-colors group">
                            <td class="p-2 sticky-col bg-white text-center border-r border-slate-200 group-hover:bg-slate-50">
                                <div class="flex items-center justify-center gap-1.5">
                                    <button onclick="openEditDateModal('${r.baocao_id}', '${rawDate}')" class="bg-blue-100 text-blue-600 hover:bg-blue-600 hover:text-white px-2.5 py-1.5 rounded text-xs font-bold transition-colors shadow-sm border border-blue-200" title="Sửa ngày">
                                        <i class="fa-solid fa-pen"></i>
                                    </button>
                                    <button onclick="deleteReport('${r.baocao_id}')" class="bg-red-100 text-red-600 hover:bg-red-600 hover:text-white px-2.5 py-1.5 rounded text-xs font-bold transition-colors shadow-sm border border-red-200" title="Xóa">
                                        <i class="fa-solid fa-trash-can"></i>
                                    </button>
                                </div>
                            </td>
                            <td class="p-2 font-bold text-slate-800">${dateStr}</td>
                            <td class="p-2 text-left text-slate-700 text-sm font-medium whitespace-normal leading-tight min-w-[200px]">${r.ten_duong_day || 'Không xác định'}</td>
                            <td class="p-2 text-slate-600 text-xs font-bold bg-slate-50">${r.ten_bb || 'Không xác định'}</td>
                            <td class="p-2 text-center">
                                <a href="${r.file_url}" target="_blank" class="bg-blue-100 text-blue-700 px-3 py-1.5 rounded text-xs font-bold hover:bg-blue-200 transition-colors inline-block shadow-sm">
                                    <i class="fa-solid fa-file-pdf mr-1"></i> Xem File
                                </a>
                            </td>
                        </tr>`;
                    });
                }
                document.getElementById('tbody').innerHTML = html;
                
                updatePaginationUI();

            } catch (err) {
                document.getElementById('tbody').innerHTML = `<tr><td colspan="5" class="p-10 text-center text-red-500 font-bold">❌ Lỗi tải dữ liệu: ${err.message}</td></tr>`;
            }
        }

        // [THÊM MỚI] Áp dụng Bộ Lọc
        function applyFilters() {
            currentPage = 1; // Khởi động lại từ trang 1 khi đổi bộ lọc
            document.getElementById('tbody').innerHTML = `<tr><td colspan="5" class="p-10 text-center font-bold text-blue-500 animate-pulse text-sm"><i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang tìm kiếm...</td></tr>`;
            loadAdminData();
        }

        // [THÊM MỚI] Xóa trắng Bộ Lọc
        function clearFilters() {
            document.getElementById('searchName').value = '';
            document.getElementById('filterType').value = '';
            document.getElementById('filterStartDate').value = '';
            document.getElementById('filterEndDate').value = '';
            applyFilters();
        }

        // Cho phép ấn Enter ở thanh tìm kiếm tên
        document.getElementById('searchName').addEventListener('keypress', function (e) {
            if (e.key === 'Enter') applyFilters();
        });

        // Hàm cập nhật hiển thị nút phân trang
        function updatePaginationUI() {
            const totalPages = Math.ceil(totalItems / itemsPerPage) || 1;
            document.getElementById('pageInfo').innerHTML = `Trang <span class="text-blue-600">${currentPage}</span> / ${totalPages} (Tổng cộng: ${totalItems} báo cáo)`;
            
            document.getElementById('btnPrev').disabled = currentPage === 1;
            document.getElementById('btnNext').disabled = currentPage === totalPages || totalPages === 0;
        }

        // Hàm xử lý khi bấm nút chuyển trang
        function changePage(delta) {
            currentPage += delta;
            document.getElementById('tbody').innerHTML = `<tr><td colspan="5" class="p-10 text-center font-bold text-blue-500 animate-pulse text-sm">Đang tải trang ${currentPage}...</td></tr>`;
            loadAdminData();
        }

        // --- CÁC HÀM XỬ LÝ SỬA NGÀY ---
        function openEditDateModal(baocao_id, currentDate) {
            if (!verifyAdmin()) return;
            document.getElementById('edit_baocao_id').value = baocao_id;
            document.getElementById('edit_ngay_kiem_tra').value = currentDate;
            document.getElementById('modal-edit-date').classList.remove('hidden');
        }

        function closeEditModal() {
            document.getElementById('modal-edit-date').classList.add('hidden');
        }

        async function saveNewDate(e) {
            e.preventDefault();
            const btn = document.getElementById('btnSaveDate');
            btn.innerHTML = '<i class="fa-solid fa-spinner fa-spin mr-2"></i> Đang lưu...';
            btn.disabled = true;

            const baocao_id = document.getElementById('edit_baocao_id').value;
            const newDate = document.getElementById('edit_ngay_kiem_tra').value;

            try {
                const { error } = await db.from('bbkt').update({ thoi_gian: newDate }).eq('baocao_id', baocao_id);
                if (error) throw error;
                
                closeEditModal();
                loadAdminData(); 
            } catch (err) {
                alert('❌ Lỗi khi cập nhật: ' + err.message);
            } finally {
                btn.innerHTML = '<i class="fa-solid fa-floppy-disk mr-2"></i> Lưu Cập Nhật';
                btn.disabled = false;
            }
        }

        // --- HÀM XÓA ---
        async function deleteReport(baocao_id) {
            if (!verifyAdmin()) return;

            if (!confirm('⚠️ CẢNH BÁO: Bạn có chắc chắn muốn XÓA biên bản này?\n\nSau khi xóa, bảng thống kê sẽ báo thiếu và nhân viên bắt buộc phải nộp lại.')) {
                return;
            }

            try {
                const { error } = await db.from('bbkt').delete().eq('baocao_id', baocao_id);
                if (error) throw error;
                alert('✅ Đã xóa biên bản thành công!');
                loadAdminData(); 
            } catch (err) {
                alert('❌ Lỗi khi xóa: ' + err.message);
            }
        }

        // Chạy khởi tạo lúc mở web
        window.onload = () => {
            loadFilterOptions(); // Lấy danh sách loại biên bản bỏ vào dropdown
            loadAdminData();     // Lấy dữ liệu bảng
        };
    </script>
</body>
</html>
