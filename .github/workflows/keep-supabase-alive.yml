name: Keep Supabase Alive

on:
  schedule:
    # Hệ thống sẽ chạy tự động vào lúc 00:00 UTC (tức 07:00 sáng giờ Việt Nam) 
    # vào các ngày Thứ 2, Thứ 4 và Thứ 6 hàng tuần để database luôn active.
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # Dòng này cho phép bạn bấm nút chạy thủ công để test bất kỳ lúc nào

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      - name: Send API Request to Supabase
        run: |
          curl -i -X GET "${{ secrets.SUPABASE_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.SUPABASE_ANON_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.SUPABASE_ANON_KEY }}"
