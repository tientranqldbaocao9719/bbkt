name: Keep Supabase Alive

on:
  schedule:
    # Chạy tự động vào lúc 00:00 UTC các ngày Thứ 2, Thứ 4, Thứ 6
    - cron: '0 0 * * 1,3,5'
  workflow_dispatch: # Nút chạy thủ công

jobs:
  ping_supabase:
    runs-on: ubuntu-latest
    steps:
      # --- ĐÁNH THỨC DỰ ÁN 1 ---
      - name: Ping Project 1 (Quản lý Báo cáo)
        run: |
          curl -i -X GET "${{ secrets.PROJECT1_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.PROJECT1_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.PROJECT1_KEY }}"

      # --- ĐÁNH THỨC DỰ ÁN 2 ---
      - name: Ping Project 2 (Tên dự án 2)
        run: |
          curl -i -X GET "${{ secrets.PROJECT2_URL }}/rest/v1/" \
          -H "apikey: ${{ secrets.PROJECT2_KEY }}" \
          -H "Authorization: Bearer ${{ secrets.PROJECT2_KEY }}"
          
      # Bạn có thể copy thêm block phía trên nếu có Dự án 3, 4...
